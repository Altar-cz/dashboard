<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Drive Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --sky-color: #87CEEB;
            --grass-color: #2dcc70;
            --road-color: #34495e;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            background: #333; 
            color: white;
        }

        /* --- SETUP SCREEN --- */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .btn {
            background: #fff;
            color: #1e3c72;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

        input {
            padding: 15px;
            border-radius: 30px;
            border: none;
            text-align: center;
            font-size: 1.2rem;
            margin: 10px;
        }

        /* --- GAME SCREEN (MONITOR) --- */
        #game-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--sky-color);
            position: relative;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60vh;
            background: var(--grass-color);
        }

        .road {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 60vh;
            background: var(--road-color);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .marking {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 100%;
            background: repeating-linear-gradient(transparent, transparent 20px, white 20px, white 40px);
            animation: move-road 1s linear infinite;
        }

        @keyframes move-road {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }

        #car {
            width: 80px;
            height: 120px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            transition: left 0.1s ease-out, transform 0.1s ease-out;
        }

        /* Auto SVG styl */
        .car-body { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
        .window { fill: #ecf0f1; }

        /* --- CONTROLLER SCREEN (MOBILE) --- */
        #controller-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #222;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .wheel-container {
            width: 250px;
            height: 250px;
            border: 15px solid #555;
            border-radius: 50%;
            position: relative;
            transition: transform 0.1s ease-out;
        }

        .wheel-spoke {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 20px;
            background: #555;
            transform: translate(-50%, -50%);
        }

        .wheel-spoke-v {
            position: absolute;
            top: 0%;
            left: 50%;
            width: 20px;
            height: 50%;
            background: #555;
            transform: translateX(-50%);
        }

        #info-text { margin-top: 30px; color: #888; font-style: italic; }

        .room-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup">
        <h1 style="font-size: 3rem; margin-bottom: 30px;">🌲 CHILL DRIVE</h1>
        <button class="btn" onclick="startAsMonitor()">SPUSTIT JAKO MONITOR</button>
        <div style="margin: 20px; color: #ccc;">— nebo —</div>
        <input type="text" id="roomInput" placeholder="KÓD MÍSTNOSTI">
        <button class="btn" style="background: #2ecc71; color: white;" onclick="requestPermission()">PŘIPOJIT MOBIL</button>
    </div>

    <!-- MONITOR SCREEN -->
    <div id="game-screen">
        <div class="room-badge">MÍSTNOST: <b id="displayCode"></b></div>
        <div class="grass"></div>
        <div class="road">
            <div class="marking"></div>
        </div>
        
        <div id="car">
            <!-- Jednoduché SVG auto -->
            <svg viewBox="0 0 100 150" width="80" height="120">
                <rect x="10" y="20" width="80" height="110" rx="15" class="car-body" />
                <rect x="20" y="40" width="60" height="30" rx="5" class="window" />
                <rect x="15" y="10" width="20" height="10" rx="2" fill="#333" />
                <rect x="65" y="10" width="20" height="10" rx="2" fill="#333" />
            </svg>
        </div>
    </div>

    <!-- CONTROLLER SCREEN -->
    <div id="controller-screen">
        <h2 id="orient-warn">DRŽTE TELEFON VODOROVNĚ</h2>
        <div id="wheel" class="wheel-container">
            <div class="wheel-spoke"></div>
            <div class="wheel-spoke-v"></div>
        </div>
        <div id="info-text">Otáčejte telefonem jako volantem</div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";
        let isMonitor = false;

        // Monitor setup
        function startAsMonitor() {
            isMonitor = true;
            currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('displayCode').innerText = currentRoom;
            socket.emit('join-room', currentRoom);
        }

        // Mobile permissions and setup
        function requestPermission() {
            // iOS requirement for motion sensors
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startAsController();
                        }
                    })
                    .catch(console.error);
            } else {
                startAsController();
            }
        }

        function startAsController() {
            currentRoom = document.getElementById('roomInput').value.toUpperCase();
            if(!currentRoom) return alert("Zadej kód místnosti!");
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';
            socket.emit('join-room', currentRoom);

            window.addEventListener('deviceorientation', handleMotion);
        }

        const wheel = document.getElementById('wheel');
        function handleMotion(event) {
            // Při horizontálním držení nás zajímá 'beta' (náklon k sobě/od sebe) 
            // nebo 'gamma' v závislosti na orientaci. 
            // Pro horizontální držení (landscape) používáme beta.
            
            let steering = 0;
            const isLandscape = window.innerWidth > window.innerHeight;
            
            if (isLandscape) {
                // Pokud drží telefon vodorovně, beta ovládá rotaci
                steering = event.beta; 
                document.getElementById('orient-warn').innerText = "VYSÍLÁM DATA...";
            } else {
                // Varování, pokud drží telefon svisle
                document.getElementById('orient-warn').innerText = "OTOČTE TELEFON DO STRANY (LANDSCAPE)";
                return;
            }

            // Vizuální zpětná vazba na mobilu
            wheel.style.transform = `rotate(${steering}deg)`;
            
            // Odeslání dat
            socket.emit('drive-data', { room: currentRoom, angle: steering });
        }

        // Game Logic (Monitor)
        const car = document.getElementById('car');
        let carVisualPos = 50; // v procentech šířky silnice

        socket.on('update-game', (data) => {
            if (data.angle !== undefined) {
                // SNÍŽENÁ CITLIVOST: úhel dělíme 40 pro velmi jemný pohyb
                // data.angle je cca -90 až 90
                let movement = data.angle / 40; 
                
                carVisualPos += movement;

                // Hranice silnice (v rámci 400px široké silnice)
                if(carVisualPos < 10) carVisualPos = 10;
                if(carVisualPos > 90) carVisualPos = 90;
                
                car.style.left = carVisualPos + "%";
                // Mírné naklonění auta pro efekt
                car.style.transform = `translateX(-50%) rotate(${data.angle / 4}deg)`;
            }
        });
    </script>
</body>
</html>
