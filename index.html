<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Drive</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #a8e6cf; }
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #car { width: 50px; height: 80px; background: #ff8b94; position: absolute; bottom: 50px; left: 50%; border-radius: 5px; transform-origin: center; transition: left 0.1s linear; }
        #controller-screen { display: none; text-align: center; padding-top: 50px; }
        .room-setup { text-align: center; margin-top: 100px; }
        .wheel { width: 200px; height: 200px; border: 10px solid #333; border-radius: 50%; margin: 50px auto; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    </style>
</head>
<body>

    <div id="setup" class="room-setup">
        <h1>🚗 Chill Drive</h1>
        <button onclick="startAsMonitor()">SPUSTIT MONITOR (PC)</button>
        <br><br>
        <input type="text" id="roomInput" placeholder="Kód místnosti">
        <button onclick="startAsController()">PŘIPOJIT MOBIL</button>
    </div>

    <div id="game-screen">
        <div id="car"></div>
        <div style="position:absolute; top:20px; left:20px;">Kód místnosti: <b id="displayCode"></b></div>
    </div>

    <div id="controller-screen">
        <h2>Držte telefon jako volant</h2>
        <div id="wheel" class="wheel">🎡</div>
        <p>Otáčejte telefonem doleva a doprava</p>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";

        function startAsMonitor() {
            currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('displayCode').innerText = currentRoom;
            socket.emit('join-room', currentRoom);
        }

        function startAsController() {
            currentRoom = document.getElementById('roomInput').value.toUpperCase();
            if(!currentRoom) return alert("Zadej kód!");
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'block';
            socket.emit('join-room', currentRoom);

            // Aktivace gyroskopu
            window.addEventListener('deviceorientation', (event) => {
                let steering = event.gamma; // Náklon do stran (-90 až 90)
                document.getElementById('wheel').style.transform = `rotate(${steering}deg)`;
                socket.emit('drive-data', { room: currentRoom, angle: steering });
            });
        }

        // Logika pohybu auta na monitoru
        const car = document.getElementById('car');
        let carPos = 50; 

        socket.on('update-game', (data) => {
            if (data.angle !== undefined) {
                // Převod úhlu na pohyb (citlivost)
                carPos += (data.angle * 0.5);
                // Omezení, aby auto nevyjelo z obrazovky
                if(carPos < 5) carPos = 5;
                if(carPos > 95) carPos = 95;
                
                car.style.left = carPos + "%";
                car.style.transform = `translateX(-50%) rotate(${data.angle/2}deg)`;
            }
        });
    </script>
</body>
</html>
