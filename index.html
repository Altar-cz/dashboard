<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Drive Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --sky-color: #87CEEB;
            --grass-color: #2dcc70;
            --road-color: #34495e;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            background: #333; 
            color: white;
        }

        /* --- SETUP SCREEN --- */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            z-index: 100;
            position: relative;
        }

        .btn {
            background: #fff;
            color: #1e3c72;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

        input {
            padding: 15px;
            border-radius: 30px;
            border: none;
            text-align: center;
            font-size: 1.2rem;
            margin: 10px;
        }

        /* --- GAME SCREEN (MONITOR) --- */
        #game-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--sky-color);
            position: relative;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60vh;
            background: var(--grass-color);
        }

        .road {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 60vh;
            background: var(--road-color);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            overflow: hidden;
        }

        .marking {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 100%;
            background: repeating-linear-gradient(transparent, transparent 20px, white 20px, white 40px);
        }

        .animating .marking {
            animation: move-road var(--speed, 1s) linear infinite;
        }

        @keyframes move-road {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }

        #car {
            width: 80px;
            height: 120px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            transition: left 0.1s ease-out, transform 0.1s ease-out;
        }

        .car-body { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
        .window { fill: #ecf0f1; }

        .obstacle {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #f39c12;
            border-radius: 5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        /* --- CONTROLLER SCREEN (MOBILE) --- */
        #controller-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #222;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .wheel-container {
            width: 180px;
            height: 180px;
            border: 12px solid #555;
            border-radius: 50%;
            position: relative;
            transition: transform 0.1s ease-out;
            margin-bottom: 20px;
        }

        .wheel-spoke { position: absolute; top: 50%; left: 50%; width: 100%; height: 15px; background: #555; transform: translate(-50%, -50%); }
        .wheel-spoke-v { position: absolute; top: 0%; left: 50%; width: 15px; height: 50%; background: #555; transform: translateX(-50%); }

        .pedals {
            display: flex;
            gap: 40px;
            width: 100%;
            justify-content: center;
        }

        .pedal {
            width: 80px;
            height: 120px;
            background: #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            user-select: none;
        }

        .pedal:active { background: #666; transform: scale(0.95); }
        .pedal-gas { border-bottom: 5px solid #2ecc71; }
        .pedal-brake { border-bottom: 5px solid #e74c3c; }

        .room-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup">
        <h1 style="font-size: 3rem; margin-bottom: 30px;">🌲 CHILL DRIVE</h1>
        <button class="btn" onclick="startAsMonitor()">SPUSTIT JAKO MONITOR</button>
        <div style="margin: 20px; color: #ccc;">— nebo —</div>
        <input type="text" id="roomInput" placeholder="KÓD MÍSTNOSTI">
        <button class="btn" style="background: #2ecc71; color: white;" onclick="requestPermission()">PŘIPOJIT MOBIL</button>
    </div>

    <!-- MONITOR SCREEN -->
    <div id="game-screen">
        <div class="room-badge">MÍSTNOST: <b id="displayCode"></b></div>
        <div id="wait-msg" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.7); padding:20px; border-radius:15px; text-align:center;">
            <h3>ČEKÁM NA PŘIPOJENÍ OVLADAČE...</h3>
            <p>Otevřete tuto stránku na mobilu a zadejte kód.</p>
        </div>
        <div class="grass"></div>
        <div class="road" id="road-element">
            <div class="marking"></div>
            <!-- Obstacles will be added here -->
        </div>
        
        <div id="car">
            <svg viewBox="0 0 100 150" width="80" height="120">
                <rect x="10" y="20" width="80" height="110" rx="15" class="car-body" />
                <rect x="20" y="40" width="60" height="30" rx="5" class="window" />
                <rect x="15" y="10" width="20" height="10" rx="2" fill="#333" />
                <rect x="65" y="10" width="20" height="10" rx="2" fill="#333" />
            </svg>
        </div>
    </div>

    <!-- CONTROLLER SCREEN -->
    <div id="controller-screen">
        <h3 id="orient-warn">OTOČTE TELEFON DO STRANY</h3>
        <div id="wheel" class="wheel-container">
            <div class="wheel-spoke"></div>
            <div class="wheel-spoke-v"></div>
        </div>
        <div class="pedals">
            <div class="pedal pedal-brake" ontouchstart="sendPedal('brake', true)" ontouchend="sendPedal('brake', false)">BRZDA</div>
            <div class="pedal pedal-gas" ontouchstart="sendPedal('gas', true)" ontouchend="sendPedal('gas', false)">PLYN</div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";
        let isMonitor = false;
        let gameActive = false;
        let speedMultiplier = 1;

        function startAsMonitor() {
            isMonitor = true;
            currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('displayCode').innerText = currentRoom;
            socket.emit('join-room', currentRoom);
        }

        function requestPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => { if (state === 'granted') startAsController(); })
                    .catch(console.error);
            } else {
                startAsController();
            }
        }

        function startAsController() {
            currentRoom = document.getElementById('roomInput').value.toUpperCase();
            if(!currentRoom) return alert("Zadej kód!");
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';
            socket.emit('join-room', currentRoom);
            socket.emit('drive-data', { room: currentRoom, status: 'ready' });
            window.addEventListener('deviceorientation', handleMotion);
        }

        function sendPedal(type, active) {
            socket.emit('drive-data', { room: currentRoom, pedal: type, active: active });
        }

        function handleMotion(event) {
            if (window.innerWidth > window.innerHeight) {
                let steering = event.beta; 
                document.getElementById('wheel').style.transform = `rotate(${steering}deg)`;
                document.getElementById('orient-warn').style.display = "none";
                socket.emit('drive-data', { room: currentRoom, angle: steering });
            } else {
                document.getElementById('orient-warn').style.display = "block";
            }
        }

        // --- Monitor Logic ---
        const car = document.getElementById('car');
        const road = document.getElementById('road-element');
        let carPos = 50; 

        socket.on('update-game', (data) => {
            if (data.status === 'ready' && !gameActive) {
                gameActive = true;
                document.getElementById('wait-msg').style.display = 'none';
                document.getElementById('game-screen').classList.add('animating');
                startObstacleSpawning();
            }

            if (data.angle !== undefined) {
                carPos += (data.angle / 45) * speedMultiplier;
                if(carPos < 10) carPos = 10;
                if(carPos > 90) carPos = 90;
                car.style.left = carPos + "%";
                car.style.transform = `translateX(-50%) rotate(${data.angle / 5}deg)`;
            }

            if (data.pedal === 'gas') {
                speedMultiplier = data.active ? 1.5 : 1;
                document.documentElement.style.setProperty('--speed', data.active ? '0.5s' : '1s');
            }
            if (data.pedal === 'brake') {
                speedMultiplier = data.active ? 0.3 : 1;
                document.documentElement.style.setProperty('--speed', data.active ? '3s' : '1s');
            }
        });

        function startObstacleSpawning() {
            setInterval(() => {
                if (!gameActive) return;
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.style.left = (Math.random() * 80 + 10) + "%";
                obs.style.top = "-50px";
                road.appendChild(obs);

                let pos = -50;
                const moveObs = setInterval(() => {
                    pos += (5 * speedMultiplier);
                    obs.style.top = pos + "px";
                    
                    // Collision check (simple)
                    const carRect = car.getBoundingClientRect();
                    const obsRect = obs.getBoundingClientRect();
                    if (pos > window.innerHeight - 200 && 
                        Math.abs(carRect.left - obsRect.left) < 40 &&
                        Math.abs(carRect.top - obsRect.top) < 60) {
                        car.style.opacity = "0.5";
                        setTimeout(() => car.style.opacity = "1", 500);
                    }

                    if (pos > window.innerHeight) {
                        clearInterval(moveObs);
                        obs.remove();
                    }
                }, 20);
            }, 3000);
        }
    </script>
</body>
</html>
