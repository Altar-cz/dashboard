<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Drive: Ultimate Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --p1-color: #ff4757;
            --p2-color: #1e90ff;
            --road-grey: #2d3436;
            --grass-green: #2ecc71;
            --sky-blue: #81ecec;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
            background: #000; 
            color: #fff;
            user-select: none;
        }

        /* --- MENU & SETUP --- */
        #setup {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .btn {
            background: #fff;
            color: #1a1a1a;
            border: none;
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .btn-green { background: #2ecc71; color: white; }

        input {
            padding: 1.2rem;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.5rem;
            text-align: center;
            width: 200px;
            margin-bottom: 20px;
            outline: none;
        }

        /* --- MONITOR UI --- */
        #game-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--sky-blue);
            overflow: hidden;
            position: relative;
        }

        .parallax-layer {
            position: absolute;
            width: 200%;
            height: 100%;
            left: -50%;
            pointer-events: none;
        }

        .clouds { background: url('https://www.transparenttextures.com/patterns/clouds.png'); opacity: 0.3; top: 0; height: 50%; animation: moveBg 60s linear infinite; }
        .mountains { bottom: 35%; height: 300px; background: linear-gradient(transparent, #2d3436); clip-path: polygon(0% 100%, 15% 20%, 30% 60%, 45% 10%, 60% 70%, 75% 30%, 90% 80%, 100% 100%); opacity: 0.4; }

        .ground { position: absolute; bottom: 0; width: 100%; height: 40vh; background: var(--grass-green); }

        .road {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 40vh;
            background: var(--road-grey);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border-left: 10px solid #fff;
            border-right: 10px solid #fff;
            overflow: hidden;
        }

        .road-stripes {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 15px; height: 100%;
            background: repeating-linear-gradient(transparent, transparent 40px, #fff 40px, #fff 80px);
        }

        .animating .road-stripes { animation: scrollRoad var(--road-speed, 1s) linear infinite; }

        @keyframes scrollRoad { from { background-position: 0 0; } to { background-position: 0 80px; } }
        @keyframes moveBg { from { transform: translateX(0); } to { transform: translateX(20%); } }

        /* --- CARS & OBJECTS --- */
        .car {
            width: 70px;
            height: 110px;
            position: absolute;
            bottom: 40px;
            z-index: 100;
            transition: left 0.1s ease-out, transform 0.1s ease-out, opacity 0.3s;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4));
        }

        .car-label { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 5px; font-size: 10px; white-space: nowrap; }

        .item {
            position: absolute;
            width: 40px; height: 40px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .fuel-bar-container { width: 60px; height: 4px; background: #000; position: absolute; bottom: -10px; left: 5px; border-radius: 2px; }
        .fuel-bar { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 500;
            pointer-events: none;
        }

        .stat { background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: #f1c40f; }

        /* --- MOBILE CONTROLLER --- */
        #controller-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #121212;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
        }

        .ctrl-grid {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            width: 100%;
            height: 100%;
            gap: 20px;
            align-items: center;
        }

        .pedal {
            height: 150px;
            background: #222;
            border: 4px solid #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            transition: 0.1s;
        }

        .pedal:active { transform: scale(0.9); background: #333; }
        .gas { border-color: #2ecc71; color: #2ecc71; }
        .brake { border-color: #e74c3c; color: #e74c3c; }

        .dashboard { text-align: center; }
        .steering-wheel {
            width: 180px;
            height: 180px;
            border: 15px solid #444;
            border-radius: 50%;
            position: relative;
            margin: 0 auto;
            transition: transform 0.1s ease-out;
        }
        .steering-wheel::after { content: ''; position: absolute; top: 0; left: 50%; width: 10px; height: 30px; background: #e74c3c; transform: translateX(-50%); border-radius: 5px; }

        #win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- SETUP -->
    <div id="setup">
        <div class="card">
            <h1 style="font-size: 4rem; margin: 0;">CHILL <span style="color: #f1c40f;">DRIVE</span></h1>
            <p style="opacity: 0.5; letter-spacing: 5px; margin-bottom: 2rem;">ULTIMATE EDITION</p>
            
            <button class="btn" onclick="startMonitor()">HOSTOVAT MONITOR (PC)</button>
            <div style="margin: 20px; opacity: 0.3;">——— nebo ———</div>
            <input type="text" id="roomInput" placeholder="KÓD" maxlength="4">
            <br>
            <button class="btn btn-green" onclick="startController()">PŘIPOJIT MOBIL</button>
        </div>
    </div>

    <!-- MONITOR -->
    <div id="game-screen">
        <div id="hud">
            <div class="stat">
                <small>VZDÁLENOST</small><br>
                <span class="stat-val" id="dist-ui">0 m</span>
            </div>
            <div class="stat" style="text-align: center;">
                <small id="lobby-status">ČEKÁNÍ NA HRÁČE...</small><br>
                <span class="stat-val" id="room-ui" style="color: #fff;">----</span>
            </div>
            <div class="stat" style="text-align: right;">
                <small>RYCHLOST</small><br>
                <span class="stat-val" id="speed-ui">0 km/h</span>
            </div>
        </div>

        <div class="parallax-layer clouds"></div>
        <div class="parallax-layer mountains"></div>
        <div class="ground"></div>

        <div class="road" id="game-road">
            <div class="road-stripes"></div>
        </div>

        <!-- Player 1 -->
        <div id="car-1" class="car" style="display: none; left: 35%;">
            <div class="car-label">HRÁČ 1</div>
            <div class="fuel-bar-container"><div id="fuel-1" class="fuel-bar"></div></div>
            <svg viewBox="0 0 100 150">
                <path d="M20,130 L80,130 L85,110 L85,40 L70,20 L30,20 L15,40 L15,110 Z" fill="var(--p1-color)" />
                <rect x="25" y="45" width="50" height="25" rx="5" fill="rgba(255,255,255,0.4)" />
                <rect x="20" y="25" width="10" height="5" fill="#f1c40f" />
                <rect x="70" y="25" width="10" height="5" fill="#f1c40f" />
            </svg>
        </div>

        <!-- Player 2 -->
        <div id="car-2" class="car" style="display: none; left: 65%;">
            <div class="car-label">HRÁČ 2</div>
            <div class="fuel-bar-container"><div id="fuel-2" class="fuel-bar"></div></div>
            <svg viewBox="0 0 100 150">
                <path d="M20,130 L80,130 L85,110 L85,40 L70,20 L30,20 L15,40 L15,110 Z" fill="var(--p2-color)" />
                <rect x="25" y="45" width="50" height="25" rx="5" fill="rgba(255,255,255,0.4)" />
                <rect x="20" y="25" width="10" height="5" fill="#f1c40f" />
                <rect x="70" y="25" width="10" height="5" fill="#f1c40f" />
            </svg>
        </div>

        <div id="win-overlay">
            <h1 id="win-msg" style="font-size: 5rem; margin: 0;">VÍTĚZ!</h1>
            <p id="win-score" style="font-size: 1.5rem; opacity: 0.7;">Vzdálenost: 0 m</p>
            <button class="btn" onclick="location.reload()">HRÁT ZNOVU</button>
        </div>
    </div>

    <!-- CONTROLLER -->
    <div id="controller-screen">
        <div class="dashboard">
            <div id="p-tag" style="padding: 10px 30px; border-radius: 50px; display: inline-block; font-weight: bold; margin-bottom: 20px;">HLEDÁM POZICI...</div>
            <h2 id="gyro-msg">DRŽTE TELEFON LANDSCAPE</h2>
        </div>

        <div class="ctrl-grid">
            <div class="pedal brake" ontouchstart="sendInput('brake', true)" ontouchend="sendInput('brake', false)">BRZDA</div>
            
            <div class="steering-wheel" id="wheel-gfx"></div>

            <div class="pedal gas" ontouchstart="sendInput('gas', true)" ontouchend="sendInput('gas', false)">PLYN</div>
        </div>
        
        <div style="font-size: 10px; opacity: 0.3;">CONNECTED TO: <span id="room-connected">----</span></div>
    </div>

    <script>
        const socket = io();
        let state = {
            room: "",
            isMonitor: false,
            playerIdx: null,
            active: false,
            distance: 0,
            speed: 5,
            players: [
                { pos: 35, angle: 0, fuel: 100, gas: false, brake: false, alive: true },
                { pos: 65, angle: 0, fuel: 100, gas: false, brake: false, alive: true }
            ]
        };

        // --- SETUP LOGIC ---
        function startMonitor() {
            state.isMonitor = true;
            state.room = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('room-ui').innerText = state.room;
            socket.emit('join-room', state.room);
        }

        async function startController() {
            state.room = document.getElementById('roomInput').value.toUpperCase();
            if(!state.room) return;

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';
            document.getElementById('room-connected').innerText = state.room;
            
            socket.emit('join-room', state.room);
            socket.emit('drive-data', { room: state.room, type: 'join-request' });

            window.addEventListener('deviceorientation', handleGyro);
        }

        function handleGyro(e) {
            if(window.innerWidth > window.innerHeight) {
                document.getElementById('gyro-msg').style.display = 'none';
                const angle = e.beta; // Steering angle
                document.getElementById('wheel-gfx').style.transform = `rotate(${angle}deg)`;
                socket.emit('drive-data', { room: state.room, idx: state.playerIdx, angle });
            } else {
                document.getElementById('gyro-msg').style.display = 'block';
            }
        }

        function sendInput(type, active) {
            socket.emit('drive-data', { room: state.room, idx: state.playerIdx, pedal: type, active });
        }

        // --- NETWORK & SYNC ---
        socket.on('update-game', data => {
            if (!state.isMonitor) {
                if (data.type === 'assign' && state.playerIdx === null) {
                    state.playerIdx = data.idx;
                    const tag = document.getElementById('p-tag');
                    tag.innerText = `HRÁČ ${data.idx + 1}`;
                    tag.style.background = data.idx === 0 ? 'var(--p1-color)' : 'var(--p2-color)';
                }
                return;
            }

            // Monitor Logic
            if (data.type === 'join-request') {
                const count = state.players.filter(p => p.connected).length;
                if(count < 2) {
                    state.players[count].connected = true;
                    document.getElementById(`car-${count+1}`).style.display = 'block';
                    document.getElementById('lobby-status').innerText = `PŘIPOJENO (${count+1}/2)`;
                    socket.emit('drive-data', { room: state.room, type: 'assign', idx: count });
                    if(count === 1) setTimeout(launchGame, 1000);
                }
            }

            if (data.idx !== undefined && state.active) {
                const p = state.players[data.idx];
                if (data.angle !== undefined) p.angle = data.angle;
                if (data.pedal === 'gas') p.gas = data.active;
                if (data.pedal === 'brake') p.brake = data.active;
            }
        });

        // --- GAME ENGINE ---
        function launchGame() {
            state.active = true;
            document.getElementById('game-screen').classList.add('animating');
            gameLoop();
            spawner();
        }

        function gameLoop() {
            if(!state.active) return;

            // Global Speed
            let targetSpeed = 8;
            state.players.forEach(p => {
                if(!p.alive) return;
                if(p.gas) targetSpeed += 5;
                if(p.brake) targetSpeed -= 4;
                p.fuel -= 0.05; // Fuel consumption
                if(p.fuel <= 0) p.alive = false;
            });
            state.speed = Math.max(3, targetSpeed);
            document.documentElement.style.setProperty('--road-speed', (15 / state.speed) + 's');

            // HUD
            state.distance += state.speed / 20;
            document.getElementById('dist-ui').innerText = Math.floor(state.distance) + " m";
            document.getElementById('speed-ui').innerText = Math.floor(state.speed * 10) + " km/h";

            // Update Players
            state.players.forEach((p, i) => {
                const car = document.getElementById(`car-${i+1}`);
                if(!p.alive) { car.style.opacity = '0.2'; return; }

                // Movement physics
                p.pos += (p.angle / 50) * (state.speed / 10);
                p.pos = Math.min(Math.max(p.pos, 5), 95);
                
                car.style.left = p.pos + "%";
                car.style.transform = `translateX(-50%) rotate(${p.angle / 6}deg)`;
                document.getElementById(`fuel-${i+1}`).style.width = p.fuel + "%";
            });

            checkCollisions();
            requestAnimationFrame(gameLoop);
        }

        function spawner() {
            if(!state.active) return;

            const type = Math.random() > 0.3 ? 'obstacle' : 'fuel';
            const item = document.createElement('div');
            item.className = 'item ' + type;
            item.innerHTML = type === 'obstacle' ? '🚧' : '⛽';
            item.style.left = (Math.random() * 70 + 15) + "%";
            item.style.top = "-50px";
            document.getElementById('game-road').appendChild(item);

            let y = -50;
            const moveInterval = setInterval(() => {
                if(!state.active) { clearInterval(moveInterval); return; }
                y += state.speed;
                item.style.top = y + "px";

                if(y > window.innerHeight) {
                    clearInterval(moveInterval);
                    item.remove();
                }
            }, 16);

            setTimeout(spawner, 2000 / (state.distance / 500 + 1));
        }

        function checkCollisions() {
            const items = document.querySelectorAll('.item');
            state.players.forEach((p, i) => {
                if(!p.alive) return;
                const carRect = document.getElementById(`car-${i+1}`).getBoundingClientRect();

                items.forEach(item => {
                    const itemRect = item.getBoundingClientRect();
                    if (Math.abs(carRect.left - itemRect.left) < 40 && Math.abs(carRect.top - itemRect.top) < 60) {
                        if(item.classList.contains('obstacle')) {
                            p.alive = false;
                            checkEnd();
                        } else {
                            p.fuel = Math.min(100, p.fuel + 30);
                            item.remove();
                        }
                    }
                });
            });
        }

        function checkEnd() {
            const alive = state.players.filter(p => p.alive);
            if(alive.length === 0 || (state.players[0].connected && state.players[1].connected && alive.length === 1)) {
                state.active = false;
                const overlay = document.getElementById('win-overlay');
                overlay.style.display = 'flex';
                document.getElementById('win-score').innerText = `Ujetá vzdálenost: ${Math.floor(state.distance)} m`;
                
                if(alive.length === 1) {
                    const idx = state.players.indexOf(alive[0]);
                    document.getElementById('win-msg').innerText = `HRÁČ ${idx+1} VYHRÁL!`;
                    document.getElementById('win-msg').style.color = idx === 0 ? 'var(--p1-color)' : 'var(--p2-color)';
                } else {
                    document.getElementById('win-msg').innerText = "REMIZA!";
                }
            }
        }
    </script>
</body>
</html>
