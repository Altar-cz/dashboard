<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Drive Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --sky-color: #87CEEB;
            --grass-color: #2dcc70;
            --road-color: #34495e;
            --p1-color: #e74c3c;
            --p2-color: #3498db;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            background: #333; 
            color: white;
        }

        /* --- SETUP SCREEN --- */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            z-index: 100;
            position: relative;
        }

        .btn {
            background: #fff;
            color: #1e3c72;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

        input {
            padding: 15px;
            border-radius: 30px;
            border: none;
            text-align: center;
            font-size: 1.2rem;
            margin: 10px;
        }

        /* --- GAME SCREEN (MONITOR) --- */
        #game-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--sky-color);
            position: relative;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60vh;
            background: var(--grass-color);
        }

        .road {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 450px;
            height: 60vh;
            background: var(--road-color);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            overflow: hidden;
        }

        .marking {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 100%;
            background: repeating-linear-gradient(transparent, transparent 20px, white 20px, white 40px);
        }

        .animating .marking {
            animation: move-road var(--speed, 1s) linear infinite;
        }

        @keyframes move-road {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }

        .car {
            width: 70px;
            height: 100px;
            position: absolute;
            bottom: 50px;
            z-index: 10;
            transition: left 0.1s ease-out, transform 0.1s ease-out, opacity 0.3s;
        }

        .car-body-p1 { fill: var(--p1-color); stroke: #c0392b; stroke-width: 2; }
        .car-body-p2 { fill: var(--p2-color); stroke: #2980b9; stroke-width: 2; }
        .window { fill: #ecf0f1; }

        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #f39c12;
            border-radius: 5px;
            z-index: 5;
            box-shadow: 0 4px #d35400;
        }

        /* --- CONTROLLER SCREEN (MOBILE) --- */
        #controller-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #222;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .wheel-container {
            width: 160px;
            height: 160px;
            border: 12px solid #555;
            border-radius: 50%;
            position: relative;
            transition: transform 0.1s ease-out;
            margin-bottom: 20px;
        }

        .wheel-spoke { position: absolute; top: 50%; left: 50%; width: 100%; height: 15px; background: #555; transform: translate(-50%, -50%); }
        .wheel-spoke-v { position: absolute; top: 0%; left: 50%; width: 15px; height: 50%; background: #555; transform: translateX(-50%); }

        .pedals {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .pedal {
            width: 70px;
            height: 100px;
            background: #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            user-select: none;
        }

        .pedal:active { background: #666; transform: scale(0.95); }
        .pedal-gas { border-bottom: 5px solid #2ecc71; }
        .pedal-brake { border-bottom: 5px solid #e74c3c; }

        #player-id-tag {
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .winner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">🌲 CHILL DRIVE</h1>
        <p style="margin-bottom: 30px; color: #aaa;">MULTIPLAYER EDITION</p>
        <button class="btn" onclick="startAsMonitor()">SPUSTIT JAKO MONITOR</button>
        <div style="margin: 20px; color: #ccc;">— nebo —</div>
        <input type="text" id="roomInput" placeholder="KÓD MÍSTNOSTI">
        <button class="btn" style="background: #2ecc71; color: white;" onclick="requestPermission()">PŘIPOJIT MOBIL</button>
    </div>

    <!-- MONITOR SCREEN -->
    <div id="game-screen">
        <div class="room-badge">MÍSTNOST: <b id="displayCode"></b></div>
        
        <div id="wait-msg" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.7); padding:20px; border-radius:15px; text-align:center; z-index:50;">
            <h3 id="status-text">ČEKÁM NA HRÁČE (0/2)...</h3>
            <p>Připojte se dvěma mobily pomocí stejného kódu.</p>
        </div>

        <div id="winner-screen" class="winner-overlay">
            <h1 id="winner-text">HRÁČ 1 VYHRÁL!</h1>
            <button class="btn" onclick="location.reload()">HRÁT ZNOVU</button>
        </div>

        <div class="grass"></div>
        <div class="road" id="road-element">
            <div class="marking"></div>
        </div>
        
        <!-- Player 1 Car -->
        <div id="car-1" class="car" style="left: 35%; display: none;">
            <svg viewBox="0 0 100 150">
                <rect x="10" y="20" width="80" height="110" rx="15" class="car-body-p1" />
                <rect x="20" y="40" width="60" height="30" rx="5" class="window" />
            </svg>
        </div>

        <!-- Player 2 Car -->
        <div id="car-2" class="car" style="left: 65%; display: none;">
            <svg viewBox="0 0 100 150">
                <rect x="10" y="20" width="80" height="110" rx="15" class="car-body-p2" />
                <rect x="20" y="40" width="60" height="30" rx="5" class="window" />
            </svg>
        </div>
    </div>

    <!-- CONTROLLER SCREEN -->
    <div id="controller-screen">
        <div id="player-id-tag">VYHLEDÁVÁM POZICI...</div>
        <h3 id="orient-warn">OTOČTE TELEFON</h3>
        <div id="wheel" class="wheel-container">
            <div class="wheel-spoke"></div>
            <div class="wheel-spoke-v"></div>
        </div>
        <div class="pedals">
            <div class="pedal pedal-brake" ontouchstart="sendPedal('brake', true)" ontouchend="sendPedal('brake', false)">BRZDA</div>
            <div class="pedal pedal-gas" ontouchstart="sendPedal('gas', true)" ontouchend="sendPedal('gas', false)">PLYN</div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";
        let isMonitor = false;
        let gameActive = false;
        let speedMultiplier = 1;
        let playersConnected = 0;
        let myPlayerIndex = null;
        
        // Game State for Monitor
        let p1Data = { pos: 35, angle: 0, alive: true, speed: 1 };
        let p2Data = { pos: 65, angle: 0, alive: true, speed: 1 };

        function startAsMonitor() {
            isMonitor = true;
            currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('displayCode').innerText = currentRoom;
            socket.emit('join-room', currentRoom);
        }

        function requestPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => { if (state === 'granted') startAsController(); })
                    .catch(console.error);
            } else {
                startAsController();
            }
        }

        function startAsController() {
            currentRoom = document.getElementById('roomInput').value.toUpperCase();
            if(!currentRoom) return alert("Zadej kód!");
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';
            socket.emit('join-room', currentRoom);
            socket.emit('drive-data', { room: currentRoom, status: 'request-index' });
            window.addEventListener('deviceorientation', handleMotion);
        }

        function sendPedal(type, active) {
            socket.emit('drive-data', { room: currentRoom, playerIndex: myPlayerIndex, pedal: type, active: active });
        }

        function handleMotion(event) {
            if (window.innerWidth > window.innerHeight) {
                let steering = event.beta; 
                document.getElementById('wheel').style.transform = `rotate(${steering}deg)`;
                document.getElementById('orient-warn').style.display = "none";
                socket.emit('drive-data', { room: currentRoom, playerIndex: myPlayerIndex, angle: steering });
            } else {
                document.getElementById('orient-warn').style.display = "block";
            }
        }

        // --- Monitor Logic ---
        socket.on('update-game', (data) => {
            if (!isMonitor) {
                // Controller receiving its assigned index
                if (data.assignIndex !== undefined && myPlayerIndex === null) {
                    myPlayerIndex = data.assignIndex;
                    const tag = document.getElementById('player-id-tag');
                    tag.innerText = `HRÁČ ${myPlayerIndex + 1}`;
                    tag.style.background = myPlayerIndex === 0 ? 'var(--p1-color)' : 'var(--p2-color)';
                }
                return;
            }

            // Monitor Logic
            if (data.status === 'request-index') {
                socket.emit('drive-data', { room: currentRoom, assignIndex: playersConnected });
                playersConnected++;
                document.getElementById('status-text').innerText = `ČEKÁM NA HRÁČE (${playersConnected}/2)...`;
                
                if (playersConnected === 1) document.getElementById('car-1').style.display = 'block';
                if (playersConnected === 2) {
                    document.getElementById('car-2').style.display = 'block';
                    setTimeout(startGame, 1000);
                }
            }

            if (!gameActive) return;

            // Handle incoming player data
            const p = data.playerIndex === 0 ? p1Data : p2Data;
            const carEl = document.getElementById(`car-${data.playerIndex + 1}`);

            if (!p.alive) return;

            if (data.angle !== undefined) {
                p.angle = data.angle;
                p.pos += (data.angle / 40) * p.speed;
                if(p.pos < 5) p.pos = 5;
                if(p.pos > 95) p.pos = 95;
                carEl.style.left = p.pos + "%";
                carEl.style.transform = `translateX(-50%) rotate(${p.angle / 5}deg)`;
            }

            if (data.pedal === 'gas') p.speed = data.active ? 1.5 : 1;
            if (data.pedal === 'brake') p.speed = data.active ? 0.4 : 1;
        });

        function startGame() {
            gameActive = true;
            document.getElementById('wait-msg').style.display = 'none';
            document.getElementById('game-screen').classList.add('animating');
            startObstacleSpawning();
        }

        function startObstacleSpawning() {
            const spawnRate = 2000;
            const interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    return;
                }
                
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.style.left = (Math.random() * 80 + 10) + "%";
                obs.style.top = "-50px";
                document.getElementById('road-element').appendChild(obs);

                let pos = -50;
                const moveObs = setInterval(() => {
                    if (!gameActive) { clearInterval(moveObs); return; }
                    
                    pos += (6 * speedMultiplier);
                    obs.style.top = pos + "px";
                    
                    // Collision detection for both players
                    [p1Data, p2Data].forEach((p, idx) => {
                        if (!p.alive) return;
                        const carEl = document.getElementById(`car-${idx + 1}`);
                        const carRect = carEl.getBoundingClientRect();
                        const obsRect = obs.getBoundingClientRect();

                        if (pos > window.innerHeight - 200 && 
                            Math.abs(carRect.left + 35 - (obsRect.left + 20)) < 40 &&
                            Math.abs(carRect.top + 50 - (obsRect.top + 20)) < 50) {
                            
                            p.alive = false;
                            carEl.style.opacity = "0.2";
                            checkGameOver();
                        }
                    });

                    if (pos > window.innerHeight) {
                        clearInterval(moveObs);
                        obs.remove();
                    }
                }, 20);
            }, spawnRate);
        }

        function checkGameOver() {
            if (!p1Data.alive && !p2Data.alive) {
                endGame("REMIZA! OBA SE VYBOURALI.");
            } else if (!p1Data.alive) {
                endGame("HRÁČ 2 VYHRÁL!");
            } else if (!p2Data.alive) {
                endGame("HRÁČ 1 VYHRÁL!");
            }
        }

        function endGame(text) {
            gameActive = false;
            document.getElementById('winner-screen').style.display = 'flex';
            document.getElementById('winner-text').innerText = text;
            document.getElementById('game-screen').classList.remove('animating');
        }
    </script>
</body>
</html>
