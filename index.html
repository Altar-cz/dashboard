<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senzor & Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:active { background: #0056b3; }
        #value-display { font-size: 48px; font-weight: bold; color: #28a745; margin: 20px 0; }
        .status { font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <h1>📊 Moje IoT Aplikace</h1>
    
    <div class="card">
        <h3>📱 Režim Senzor</h3>
        <p>Kliknutím odešlete náhodná data do všech monitorů.</p>
        <button onclick="odeslatData()">Odeslat hodnotu</button>
    </div>

    <div class="card">
        <h3>🖥️ Režim Monitor</h3>
        <p>Poslední přijatá hodnota:</p>
        <div id="value-display">--</div>
        <p class="status" id="time-display">Čekám na data...</p>
    </div>

    <script>
        // Připojení k serveru (na Renderu nemusíme psát URL, najde si ji sám)
        const socket = io();

        // 1. ODESÍLÁNÍ (pro mobil)
        function odeslatData() {
            const nahodneCislo = Math.floor(Math.random() * 100) + 1;
            const cas = new Date().toLocaleTimeString();
            
            // Pošleme data na server
            socket.emit('sensor-data', { 
                value: nahodneCislo, 
                time: cas 
            });
            
            console.log("Data odeslána: " + nahodneCislo);
        }

        // 2. PŘÍJEM (pro PC/Dashboard)
        socket.on('update-dashboard', (data) => {
            document.getElementById('value-display').innerText = data.value;
            document.getElementById('time-display').innerText = "Aktualizováno v: " + data.time;
            
            // Malý vizuální efekt při změně
            document.getElementById('value-display').style.color = '#007bff';
            setTimeout(() => {
                document.getElementById('value-display').style.color = '#28a745';
            }, 300);
        });
    </script>
</body>
</html>
